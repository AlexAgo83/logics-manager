      - name: Workflow audit (blocking, grouped)
        run: python logics/skills/logics-flow-manager/scripts/workflow_audit.py --legacy-cutoff-version 1.1.0 --group-by-doc

      - name: Workflow audit (JSON report)
        continue-on-error: true
        run: python logics/skills/logics-flow-manager/scripts/workflow_audit.py --format json

      - name: Logics kit Python tests
        run: python -m unittest discover -s logics/skills/tests -p "test_*.py" -v

      - name: Logics kit CLI smoke checks
        run: python logics/skills/tests/run_cli_smoke_checks.py

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
