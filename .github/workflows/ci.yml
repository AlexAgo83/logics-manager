name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Logics docs lint (strict status)
        run: python logics/skills/logics-doc-linter/scripts/logics_lint.py --require-status

      - name: Logics flow sync close-eligible requests
        run: python logics/skills/logics-flow-manager/scripts/logics_flow.py sync close-eligible-requests

      - name: Ensure requests unchanged after sync
        run: git diff --exit-code -- logics/request

      - name: Workflow audit (blocking, grouped)
        run: python logics/skills/logics-flow-manager/scripts/workflow_audit.py --legacy-cutoff-version 1.1.0 --group-by-doc

      - name: Workflow audit (JSON report)
        continue-on-error: true
        run: python logics/skills/logics-flow-manager/scripts/workflow_audit.py --format json

      - name: Logics kit Python tests
        run: python -m unittest discover -s logics/skills/tests -p "test_*.py" -v

      - name: Logics kit CLI smoke checks
        run: python logics/skills/tests/run_cli_smoke_checks.py

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Extension smoke checks
        run: npm run test:smoke

      - name: Logics docs lint
        run: npm run lint:logics

      - name: VSIX package validation
        run: npm run package:ci

  validate-windows:
    runs-on: windows-latest
    steps:
