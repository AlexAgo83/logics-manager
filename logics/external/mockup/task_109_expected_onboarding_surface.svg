  <text x="1180" y="208" fill="#D6DAE0" font-family="Arial, sans-serif" font-size="13">ID: req_119</text>
  <text x="1180" y="230" fill="#D6DAE0" font-family="Arial, sans-serif" font-size="13">Theme: Workflow</text>
  <text x="1180" y="252" fill="#D6DAE0" font-family="Arial, sans-serif" font-size="13">Status: Draft then structured</text>
  <text x="1180" y="274" fill="#D6DAE0" font-family="Arial, sans-serif" font-size="13">Mode: Guided request</text>
  <text x="1180" y="296" fill="#D6DAE0" font-family="Arial, sans-serif" font-size="13">Autonomy: unchanged</text>

  <rect x="1178" y="330" width="202" height="112" rx="14" fill="#23252A"/>
  <text x="1194" y="356" fill="#F2C94C" font-family="Arial, sans-serif" font-size="12" font-weight="700">After task_109</text>
  <text x="1194" y="380" fill="#E8EBEF" font-family="Arial, sans-serif" font-size="12">- model and copy defined</text>
  <text x="1194" y="400" fill="#E8EBEF" font-family="Arial, sans-serif" font-size="12">- entry surface updated</text>
  <text x="1194" y="420" fill="#E8EBEF" font-family="Arial, sans-serif" font-size="12">- workflow alignment kept</text>

  <rect x="1178" y="470" width="202" height="176" rx="14" fill="#23252A"/>
  <text x="1194" y="496" fill="#F2C94C" font-family="Arial, sans-serif" font-size="12" font-weight="700">Internal mapping</text>
  <text x="1194" y="520" fill="#C9CED5" font-family="Arial, sans-serif" font-size="12">Need -> request</text>
  <text x="1194" y="540" fill="#C9CED5" font-family="Arial, sans-serif" font-size="12">Framing -> refined request</text>
  <text x="1194" y="560" fill="#C9CED5" font-family="Arial, sans-serif" font-size="12">Execution -> backlog + task</text>
  <text x="1194" y="592" fill="#8FB4FF" font-family="Arial, sans-serif" font-size="12" font-weight="700">Deferred by design</text>
  <text x="1194" y="616" fill="#C9CED5" font-family="Arial, sans-serif" font-size="12">No full auto orchestration</text>

  <rect x="1178" y="672" width="202" height="110" rx="14" fill="#23252A"/>
  <text x="1194" y="698" fill="#F2C94C" font-family="Arial, sans-serif" font-size="12" font-weight="700">Validation</text>
  <text x="1194" y="722" fill="#C9CED5" font-family="Arial, sans-serif" font-size="12">compile</text>
  <text x="1194" y="742" fill="#C9CED5" font-family="Arial, sans-serif" font-size="12">tests</text>
  <text x="1194" y="762" fill="#C9CED5" font-family="Arial, sans-serif" font-size="12">logics lint + audit</text>
