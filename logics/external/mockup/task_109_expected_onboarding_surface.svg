  <text x="76" y="94" fill="#8F9399" font-family="Arial, sans-serif" font-size="12">Guided onboarding after task_109</text>

  <rect x="72" y="132" width="256" height="274" rx="14" fill="#1F1F1F" stroke="#3A3A3A"/>
  <text x="92" y="162" fill="#F4F4F4" font-family="Arial, sans-serif" font-size="13" font-weight="700">Tools</text>
  <rect x="88" y="178" width="224" height="38" rx="10" fill="#2B2B2B" stroke="#4C8DFF"/>
  <text x="104" y="201" fill="#DCE7FF" font-family="Arial, sans-serif" font-size="13" font-weight="700">New Request</text>
